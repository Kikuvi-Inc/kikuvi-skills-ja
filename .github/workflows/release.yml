name: release

on:
  push:
    branches: [dev]
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Install apm
        run: |
          curl -sSL https://aka.ms/apm-unix | sh
          echo "$HOME/.apm/bin" >> "$GITHUB_PATH"

      - name: Stage dev tree onto main
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh auth setup-git
          git fetch origin main
          git checkout -B __publish origin/main
          git read-tree -u --reset "$GITHUB_SHA"

      - name: Set version from tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          sed -i -E "s/^version:.*/version: ${version}/" apm.yml
          jq --arg v "${version}" '.version = $v' .codex-plugin/plugin.json > plugin.tmp && mv plugin.tmp .codex-plugin/plugin.json
          echo "RELEASE_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Build plugin manifests
        run: |
          mkdir -p .claude
          apm install --only mcp
          apm pack

      - name: Publish to main
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          bot_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${bot_id}+${APP_SLUG}[bot]@users.noreply.github.com"
          git add -A
          git add -f .mcp.json .claude-plugin/plugin.json .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "release: v${RELEASE_VERSION} (${GITHUB_SHA::7})"
          git push origin __publish:main
