name: release

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install apm
        run: |
          curl -sSL https://aka.ms/apm-unix | sh
          echo "$HOME/.apm/bin" >> "$GITHUB_PATH"

      - name: Stage dev tree onto main
        run: |
          git fetch origin main
          git checkout -B __publish origin/main
          git read-tree -u --reset "$GITHUB_SHA"

      - name: Build plugin manifests
        run: |
          mkdir -p .claude
          apm install --only mcp
          apm pack

      - name: Publish to main
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          bot_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${bot_id}+${APP_SLUG}[bot]@users.noreply.github.com"
          git add -A
          git add -f .mcp.json .claude-plugin/plugin.json .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "build: publish from ${GITHUB_SHA::7}"
          git push origin __publish:main
